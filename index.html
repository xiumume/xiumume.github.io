<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朽木自雕随机点名工具</title>
    <link rel="stylesheet" href="./home.css">
</head>

<body>
    <script src="./mian.js"></script>
    <div id="top-Box">
        <a id="webName" href="https://github.com/xiumume/xiumume.github.io" alt="" id="top-div">朽木自雕网页点名工具</a>
        <p>使用html5与JavaScript实现，已在Github上托管开源</p>
    </div>
    <div id="tools-Outbox">
        <div id="tools-Inbox">
            <h2 id="display-Text">Welcome</h2>
        </div>

        <a id="create" class="named-Mian-a" href="./create/">创建名单</a>
        <br>
        <div>
            <p id="reutrn-text"><br></p>
            <button class="named-Mian" onclick="button1()">开始点名</button>
            <button class="named-Mian" onclick="document.getElementById('file').click()">导入名单</button>
            <button id="named-Mian-create" onclick="document.getElementById('create').click()">创建名单</button>
            <input type="file" id="file" onchange="inputFile(this.files)" />
        </div>
    </div>
</body>

</html>
